<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="../assets/homepage.css" />
    <link rel="stylesheet" href="../assets/contact.css" />
    <link rel="icon" href="../images/logo32.png" type="image/png" />
  </head>
  <body>
    <div class="parent">
      <div class="header">
        <a href="../html/HomePage.html">
          <img src="../images/logo32.png" alt="Logo" class="logo" />
        </a>
        <div class="header-group">
          <a href="../html/HomePage.html" class="home" data-i18n="header.home">Home</a>
          <a href="../html/Projects.html" class="project" data-i18n="header.project">Projects</a>
          <a href="../html/Contact.html" class="contact" data-i18n="header.contact">Contact</a>
        </div>
        <div class="languages">
          <button class="lang-button" onclick="i18n.toggle()">SR / EN</button>
        </div>
      </div>

      <div class="content">
        <div class="contact-form">
          <div class="contact-form-header">
            <h1 style="color: rgb(180, 51, 255)" data-i18n="contentContact.contactFormHeader">Email me</h1>
          </div>
          <div class="inputs">
            <input type="text" data-i18n-placeholder="contentContact.from" placeholder="From" />
            <input type="email" data-i18n-placeholder="contentContact.cc" placeholder="CC" />
            <input type="email" data-i18n-placeholder="contentContact.myEmail" placeholder="My E-mail" />
            <input type="text" data-i18n-placeholder="contentContact.subject" placeholder="Subject" />
            <textarea data-i18n-placeholder="contentContact.body" placeholder="Body" class="body"></textarea>
          </div>
          <div class="contact-button">
            <button class="send-button">
              <span data-i18n="contentContact.send">Send</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                fill="currentColor"
                class="bi bi-arrow-right-short"
                viewBox="0 0 16 16"
              >
                <path
                  fill-rule="evenodd"
                  d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="top-scroll-button">
          <a href="#top">
            <button class="top-button">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
              </svg>
            </button>
          </a>
        </div>
      </div>

      <div class="footer">
        <div class="contacts">
          <div class="contacts-header">
            <span class="footer-header-text" data-i18n="footer.contactHeaderText">Contact me</span>
          </div>
          <div class="contacts-main">
            <a href="../html/Contact.html">
              <span class="contacts-email">radovicmihajlo18@gmail.com</span>
            </a>
            <span class="contacts-number">+381 64 516 1614</span>
          </div>
        </div>
        <div class="socials">
          <div class="socials-header">
            <span class="footer-header-text" data-i18n="footer.socialsheader">Socials</span>
          </div>
          <div class="socials-main">
            <a href="https://github.com/mihajlo-radovic" target="_blank">
              <span class="socials-text">GitHub</span>
            </a>
            <a
              href="https://www.linkedin.com/in/mihajlo-radovi%C4%87-9530a8343/"
              target="_blank"
            >
              <span class="socials-text">LinkedIn</span>
            </a>
            <a
              href="https://www.instagram.com/mihajloradovic18/"
              target="_blank"
            >
              <span class="socials-text">Instagram</span>
            </a>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/i18n.js"></script>
  </body>
</html>
